<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devine le Parti — déménagement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0a0a0a;
      --paper: #fdf6e3;
      --blue: #2a4dff;
      --red: #ff3b3b;
      --font-display: 'Archivo Black', system-ui, sans-serif;
      --font-body: 'Space Grotesk', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(10,10,10,0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      z-index: 0;
    }
    .wrap {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 620px;
      background: #ffffff;
      border: 4px solid var(--ink);
      box-shadow: 10px 10px 0 0 var(--ink);
      padding: 40px 36px;
      text-align: center;
    }
    .flag-fr {
      display: inline-flex;
      width: 64px;
      height: 42px;
      border: 3px solid var(--ink);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .flag-fr span { flex: 1; height: 100%; display: block; }
    .flag-fr span:nth-child(1) { background: var(--blue); }
    .flag-fr span:nth-child(2) { background: #ffffff; }
    .flag-fr span:nth-child(3) { background: var(--red); }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }
    .lede {
      font-size: 17px;
      line-height: 1.55;
      margin-bottom: 8px;
    }
    .domain {
      font-family: var(--font-display);
      font-size: clamp(22px, 4vw, 32px);
      letter-spacing: -0.01em;
      margin: 22px 0 30px;
      padding: 14px 18px;
      background: var(--paper);
      border: 3px solid var(--ink);
      display: inline-block;
      word-break: break-all;
    }
    .cta {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      color: #ffffff;
      background: var(--ink);
      border: 4px solid var(--ink);
      box-shadow: 6px 6px 0 0 var(--blue);
      padding: 16px 28px;
      display: inline-block;
      transition: transform 140ms cubic-bezier(.2,.8,.2,1),
                  box-shadow 140ms cubic-bezier(.2,.8,.2,1);
    }
    .cta:hover, .cta:focus-visible {
      transform: translate(-3px, -3px);
      box-shadow: 9px 9px 0 0 var(--blue);
      outline: none;
    }
    .footer {
      margin-top: 28px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <span class="flag-fr" aria-hidden="true"><span></span><span></span><span></span></span>
      <h1>Le jeu a déménagé&nbsp;!</h1>
      <p class="lede">« Devine le Parti » est désormais accessible à sa nouvelle adresse&nbsp;:</p>
      <div class="domain">devineleparti.dev</div>
      <p>
        <a class="cta" href="https://devineleparti.dev">Aller sur le nouveau site →</a>
      </p>
      <p class="footer">Pensez à mettre à jour vos favoris.</p>
    </div>
  </main>
</body>
</html>
