<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Devine le Député — UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0a0a0a;
    --paper: #fdf6e3;
    --paper-2: #f5ecc8;
    --blue: #2a4dff;
    --red: #ff3b3b;
    --white-tri: #ffffff;
    --pink: #ff5d8f;
    --green: #38d39f;
    --orange: #ff9a3c;
    --violet: #b06bff;
    --yellow: #ffd23f;
    --shadow: 6px 6px 0 0 var(--ink);
    --shadow-lg: 10px 10px 0 0 var(--ink);
    --shadow-sm: 3px 3px 0 0 var(--ink);
    --border: 3px solid var(--ink);
    --border-thick: 4px solid var(--ink);

    /* Macro families */
    --m-gauche: #e63946;   /* rouge */
    --m-droite: #2a4dff;   /* bleu */
    --m-facho:  #0a0a0a;   /* noir */
    --m-ni:     #8a8a8a;   /* gris */

    /* Group colors */
    --g-lfi:  #8b3fcf;     /* LFI: violet */
    --g-gdr:  #d12a2a;     /* GDR: rouge */
    --g-ecos: #2da567;     /* Écolo: vert */
    --g-soc:  #ff5d8f;     /* PS: rose */
    --g-epr:  #ffd23f;     /* EPR: jaune */
    --g-dem:  #ff9a3c;     /* MoDem: orange */
    --g-hor:  #5cc8f0;     /* Horizons: bleu ciel */
    --g-liot: #4b3cd1;     /* LIOT: indigo */
    --g-dr:   #1f3a6b;     /* DR: bleu marine */
    --g-udr:  #6b3f1f;     /* UDR: marron */
    --g-rn:   #0a0a0a;     /* RN: noir */
    --g-ni:   #8a8a8a;     /* NI: gris */
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Pattern background overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(circle, rgba(10,10,10,0.06) 1px, transparent 1px);
    background-size: 22px 22px;
    z-index: 0;
  }

  body[data-bg="grid"]::before {
    background-image:
      linear-gradient(to right, rgba(10,10,10,0.08) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(10,10,10,0.08) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  body[data-bg="stripes"]::before {
    background: repeating-linear-gradient(45deg, transparent 0 18px, rgba(10,10,10,0.05) 18px 19px);
  }
  body[data-bg="none"]::before { display: none; }

  #root { position: relative; z-index: 1; }

  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 36px 28px 80px;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .brand-mark {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .tri {
    display: flex;
    border: var(--border-thick);
    box-shadow: var(--shadow-sm);
    background: var(--ink);
    transform: rotate(-2deg);
  }
  .tri span {
    display: block;
    width: 16px;
    height: 36px;
  }
  .tri span:nth-child(1){ background: var(--blue); }
  .tri span:nth-child(2){ background: var(--white-tri); }
  .tri span:nth-child(3){ background: var(--red); }

  .title-block h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(40px, 6.4vw, 76px);
    line-height: 0.92;
    margin: 0;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }
  .title-block h1 .accent {
    background: var(--blue);
    color: var(--paper);
    padding: 0 12px;
    border: var(--border-thick);
    box-shadow: var(--shadow-sm);
    display: inline-block;
    transform: rotate(-1deg);
  }
  .subtitle {
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    padding: 6px 12px;
    border: var(--border-thick);
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .timer-card {
    background: var(--yellow);
    border: var(--border-thick);
    box-shadow: var(--shadow);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    transform: rotate(2deg);
    transition: background 0.2s;
  }
  .timer-card.countdown { background: var(--orange); }
  .timer-card.critical {
    background: var(--red);
    color: var(--paper);
    animation: shake 0.4s infinite;
  }
  .timer-dot {
    width: 12px; height: 12px;
    background: var(--red);
    border: 2px solid var(--ink);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  .timer-card.critical .timer-dot { background: var(--paper); }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--paper-2);
    border: var(--border-thick);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    position: relative;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .stat-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 8px 8px 0 0 var(--ink);
  }
  .stat-card[data-tone="good"] { background: var(--green); }
  .stat-card[data-tone="bad"]  { background: var(--pink); }
  .stat-card[data-tone="streak"] { background: var(--orange); }
  .stat-card[data-tone="record"] { background: var(--violet); color: var(--paper); }

  .stat-card .stat-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .stat-card .icon {
    width: 26px; height: 26px;
    display: grid; place-items: center;
    background: var(--ink);
    color: var(--paper);
    border-radius: 50%;
    font-size: 13px;
    font-weight: 800;
  }
  .stat-card .num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 56px;
    line-height: 1;
    margin-top: 8px;
    letter-spacing: -0.02em;
  }
  .stat-card .delta {
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    opacity: 0.75;
  }

  /* MODE TOGGLE */
  .modes {
    display: flex;
    gap: 14px;
    margin-bottom: 28px;
    align-items: center;
    flex-wrap: wrap;
  }
  .mode-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-right: 4px;
  }
  .mode-btn {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    background: var(--paper);
    border: var(--border-thick);
    box-shadow: var(--shadow-sm);
    padding: 12px 20px;
    cursor: pointer;
    color: var(--ink);
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mode-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 0 var(--ink);}
  .mode-btn.active {
    background: var(--ink);
    color: var(--paper);
    box-shadow: var(--shadow);
    transform: translate(-2px,-2px);
  }
  .mode-btn .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--yellow);
    color: var(--ink);
    padding: 2px 6px;
    border: 2px solid var(--ink);
  }

  /* MAIN GRID */
  .main {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 28px;
    align-items: stretch;
  }

  @media (max-width: 880px) {
    .app { padding: 24px 18px 64px; }
    .main { grid-template-columns: 1fr; gap: 22px; }
    .stats { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .header { flex-direction: column; align-items: flex-start; gap: 14px; }
    .header-right { align-items: flex-start; }
    .title-block h1 { font-size: clamp(36px, 11vw, 56px); }
    .modes { gap: 8px; }
    .mode-btn { font-size: 13px; padding: 10px 14px; }
    .mode-btn .badge { font-size: 9px; padding: 1px 4px; }
    .stat-card .num { font-size: 42px; }
    .stat-card { padding: 12px 14px; }
    .deputy-card { padding: 14px; }
    .deputy-card::before { font-size: 9px; padding: 3px 8px; left: 18px; }
    .panel { padding: 16px; }
    .question-bar { font-size: 14px; padding: 10px 12px; }
    .next-btn { font-size: 16px; padding: 14px; }
    .ticker { height: 32px; }
    .ticker-track { font-size: 11px; gap: 24px; }
    .axis-row { font-size: 9px; }
  }
  @media (max-width: 480px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .stat-card .num { font-size: 36px; }
    .modes { flex-wrap: wrap; }
    .mode-btn { flex: 1; justify-content: center; min-width: calc(50% - 8px); }
    .deputy-meta { grid-template-columns: 1fr; }
    .reveal-banner { padding: 6px 8px; }
    .reveal-name { font-size: 15px; }
    .hover-hint { font-size: 9px; padding: 3px 8px; }
  }

  /* DEPUTY CARD */
  .deputy-card {
    background: var(--white-tri);
    border: 5px solid var(--ink);
    box-shadow: var(--shadow-lg);
    padding: 18px;
    position: relative;
  }
  .deputy-card::before {
    content: "DOSSIER N° 247";
    position: absolute;
    top: -16px; left: 24px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    padding: 4px 10px;
    border: 3px solid var(--ink);
  }
  .deputy-card::after {
    content: "?";
    position: absolute;
    top: -22px; right: 18px;
    width: 50px; height: 50px;
    background: var(--yellow);
    border: var(--border-thick);
    box-shadow: var(--shadow-sm);
    display: grid; place-items: center;
    font-family: 'Archivo Black', sans-serif;
    font-size: 32px;
    transform: rotate(8deg);
  }

  .photo-wrap {
    position: relative;
    aspect-ratio: 1 / 1.05;
    overflow: hidden;
    border: var(--border-thick);
    background: linear-gradient(135deg, #cfe7ff 0%, #b8d4ff 100%);
  }
  /* Placeholder face SVG fills .photo-wrap */
  .photo-wrap .scan-lines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, rgba(10,10,10,0.0) 0 4px, rgba(10,10,10,0.04) 4px 5px);
    mix-blend-mode: multiply;
    pointer-events: none;
  }
  .photo-wrap .corner {
    position: absolute;
    width: 16px; height: 16px;
    border: 3px solid var(--ink);
  }
  .photo-wrap .corner.tl { top: 8px; left: 8px; border-right: 0; border-bottom: 0; }
  .photo-wrap .corner.tr { top: 8px; right: 8px; border-left: 0; border-bottom: 0; }
  .photo-wrap .corner.bl { bottom: 8px; left: 8px; border-right: 0; border-top: 0; }
  .photo-wrap .corner.br { bottom: 8px; right: 8px; border-left: 0; border-top: 0; }

  .photo-tag {
    position: absolute;
    bottom: 12px; left: 12px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    padding: 4px 8px;
    text-transform: uppercase;
  }
  .photo-tag.sex { left: auto; right: 12px; background: var(--paper); color: var(--ink); border: 2px solid var(--ink);}

  /* Reveal banner over photo, after answer */
  .reveal-banner {
    position: absolute;
    left: 12px; right: 12px; bottom: 12px;
    border: var(--border-thick);
    box-shadow: var(--shadow-sm);
    background: var(--paper);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: reveal 0.35s ease-out;
  }
  @keyframes reveal {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .reveal-banner[data-tone="correct"] { border-color: var(--ink); background: var(--green); }
  .reveal-banner[data-tone="wrong"] { border-color: var(--ink); background: var(--red); color: var(--paper); }
  .reveal-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    text-transform: uppercase;
  }
  .reveal-group {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    padding: 4px 8px;
    border: 2px solid var(--ink);
    color: var(--paper);
    align-self: flex-start;
    text-shadow: 0 0 0 var(--ink);
  }

  .deputy-meta {
    margin-top: 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    animation: reveal 0.45s 0.1s both ease-out;
  }
  .meta-chip {
    background: var(--paper-2);
    border: var(--border);
    padding: 8px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .meta-chip strong {
    display: block;
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    letter-spacing: 0;
    margin-top: 2px;
    text-transform: none;
  }

  .question-bar {
    margin-top: 18px;
    background: var(--blue);
    color: var(--paper);
    border: var(--border-thick);
    padding: 14px 16px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .question-bar .arrow {
    font-family: 'JetBrains Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    padding: 2px 6px;
    border: 2px solid var(--ink);
    font-size: 14px;
  }

  /* RIGHT COLUMN */
  .right-col {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .panel {
    background: var(--paper);
    border: var(--border-thick);
    box-shadow: var(--shadow);
    padding: 22px;
    position: relative;
  }
  .panel-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    text-transform: uppercase;
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-title .num-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--ink);
    color: var(--paper);
    padding: 2px 8px;
  }

  /* HEMICYCLE */
  .hemicycle-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 2 / 1.1;
    margin: 0 auto;
  }
  .hemicycle-wrap svg { width: 100%; height: 100%; display: block; }
  .hemicycle-wrap .macro path {
    transition: opacity 0.18s ease, filter 0.18s ease;
  }
  .hemicycle-wrap .macro:hover path { filter: brightness(1.08); }
  .hemicycle-wrap .sub-group path {
    animation: subFade 0.22s ease-out;
  }
  @keyframes subFade {
    from { opacity: 0; }
    to { opacity: 0.94; }
  }
  .hover-hint {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    padding: 4px 10px;
    border: 2px solid var(--ink);
    pointer-events: none;
    opacity: 0.85;
  }

  /* NI button at center of hemicycle (replaces podium) */
  .ni-center-btn {
    position: absolute;
    left: 50%;
    bottom: 4%;
    transform: translateX(-50%);
    width: 30%;
    max-width: 130px;
    min-width: 92px;
    aspect-ratio: 2.4 / 1;
    background: var(--m-ni);
    color: var(--paper);
    border: var(--border-thick);
    border-bottom: 0;
    box-shadow: var(--shadow-sm);
    border-radius: 100% 100% 0 0 / 100% 100% 0 0;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding-bottom: 4px;
    transition: transform 0.12s, box-shadow 0.12s, background 0.18s;
  }
  .ni-center-btn:hover:not(:disabled) {
    transform: translateX(-50%) translateY(-3px);
    box-shadow: 6px 6px 0 0 var(--ink);
    background: #6e6e6e;
  }
  .ni-center-btn:disabled { cursor: not-allowed; }
  .ni-center-btn .ni-label {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    line-height: 1;
  }
  .ni-center-btn .ni-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.85;
    margin-top: 2px;
  }
  .ni-center-btn.correct { background: var(--green); color: var(--ink); }
  .ni-center-btn.wrong { background: var(--red); color: var(--paper); }
  .axis-row {
    display: flex; justify-content: space-between;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .axis-row .pill {
    background: var(--ink);
    color: var(--paper);
    padding: 4px 10px;
    border: 2px solid var(--ink);
  }

  /* GROUP CHOICES */
  .choices {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .choices.easy { grid-template-columns: repeat(3, 1fr); }
  .choice {
    cursor: pointer;
    background: var(--paper);
    border: var(--border-thick);
    box-shadow: var(--shadow-sm);
    padding: 10px 12px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--ink);
    transition: transform 0.08s, box-shadow 0.08s;
    user-select: none;
  }
  .choice:hover {
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 0 var(--ink);
  }
  .choice:active {
    transform: translate(2px,2px);
    box-shadow: 0 0 0 0 var(--ink);
  }
  .choice .swatch {
    width: 22px; height: 22px;
    border: 2px solid var(--ink);
    flex-shrink: 0;
  }
  .choice .meta {
    display: flex;
    flex-direction: column;
    line-height: 1.05;
  }
  .choice .abbr {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    letter-spacing: 0.01em;
  }
  .choice .seats {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 10px;
    opacity: 0.65;
    letter-spacing: 0.06em;
  }
  .choice.correct {
    background: var(--green);
    animation: shake 0.4s;
  }
  .choice.wrong {
    background: var(--red);
    color: var(--paper);
  }
  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    25% { transform: translate(-3px, 0); }
    75% { transform: translate(3px, 0); }
  }

  /* HELPS */
  .helps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .help-btn {
    cursor: pointer;
    background: var(--paper-2);
    border: var(--border-thick);
    box-shadow: var(--shadow-sm);
    padding: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .help-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 0 var(--ink); }
  .help-btn .glyph {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
  }
  .help-btn .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: var(--ink);
    color: var(--paper);
    padding: 1px 6px;
  }

  /* NEXT BUTTON */
  .next-btn {
    margin-top: 16px;
    width: 100%;
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    border: var(--border-thick);
    box-shadow: var(--shadow);
    padding: 16px 20px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    animation: reveal 0.3s ease-out;
  }
  .next-btn:hover {
    transform: translate(-2px,-2px);
    box-shadow: 8px 8px 0 0 var(--ink);
  }

  /* (legacy action row, unused) */
  .action-row {
    display: none;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    flex-wrap: wrap;
    gap: 14px;
  }
  .skip-btn, .submit-btn {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    text-transform: uppercase;
    border: var(--border-thick);
    box-shadow: var(--shadow-sm);
    padding: 14px 22px;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .skip-btn { background: var(--paper); color: var(--ink); }
  .submit-btn { background: var(--red); color: var(--paper); }
  .skip-btn:hover, .submit-btn:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow); }

  /* TICKER */
  .ticker {
    margin-top: 26px;
    background: var(--ink);
    color: var(--paper);
    border: var(--border-thick);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    height: 38px;
    display: flex;
    align-items: center;
  }
  .ticker-track {
    display: flex;
    gap: 36px;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    animation: scroll 40s linear infinite;
    padding-left: 100%;
  }
  .ticker-track span { display: inline-flex; align-items: center; gap: 8px; }
  .ticker-track .dot { width: 8px; height: 8px; background: var(--yellow); border-radius: 50%; display: inline-block; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
</style>
</head>
